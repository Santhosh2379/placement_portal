<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PlacementPath</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Placement<span>Path</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="resources.html">Resources</a></li>
            <li><a href="companies.html">Companies</a></li>
            <li><a href="roadmaps.html">Roadmaps</a></li>
        </ul>
        <ul class="nav-auth" id="nav-auth">
            <li><a href="login.html" class="btn-auth btn-login">Login</a></li>
            <li><a href="register.html" class="btn-auth btn-register">Register</a></li>
        </ul>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your student dashboard</p>
            </div>

            <div id="statusMsg" class="status-msg"></div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>College Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPass" placeholder="Enter password" required>
                        <i class="fa-regular fa-eye" id="togglePassword"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div class="divider-text">SECURE LOGIN</div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Create Account</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
